<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Item Card</title>
  <style>
    :root {
      /* Colors */
      --color-bg-card: #ffffff;
      --color-bg-body: #f3f4f6;
      --color-text-primary: #111827;
      --color-text-secondary: #374151;
      --color-border: #e5e7eb;
      
      --color-priority-high-bg: #fee2e2;
      --color-priority-high-text: #991b1b;
      --color-priority-medium-bg: #fef3c7;
      --color-priority-medium-text: #92400e;
      --color-priority-low-bg: #d1fae5;
      --color-priority-low-text: #065f46;
      
      --color-status-bg: #e0e7ff;
      --color-status-text: #3730a3;
      --color-status-done-bg: #d1fae5;
      --color-status-done-text: #065f46;
      
      --color-tag-bg: #f3f4f6;
      --color-tag-text: #374151;
      
      --color-btn-border: #d1d5db;
      --color-btn-text: #374151;
      --color-btn-hover-bg: #f9fafb;
      --color-btn-danger-hover: #fee2e2;
      --color-btn-danger-text: #dc2626;
      
      --color-focus-ring: #2563eb;

      /* Typography */
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
      
      /* Spacing */
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      
      /* Borders & Shadows */
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg-body);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-md);
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background-color: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      width: 100%;
      box-shadow: var(--shadow-sm);
      transition: opacity 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    /* Completed State */
    .card.completed {
      opacity: 0.65;
      background-color: #fafafa;
    }

    .card.completed .card-title {
      text-decoration: line-through;
      color: var(--color-text-secondary);
    }

    @media (min-width: 768px) {
      .card {
        max-width: 480px;
        padding: var(--spacing-lg);
      }
    }

    .header-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .checkbox-input {
      width: 1.25rem;
      height: 1.25rem;
      cursor: pointer;
      accent-color: var(--color-status-text);
    }

    .checkbox-input:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    .checkbox-label {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-weight: 500;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      transition: color 0.3s ease, text-decoration 0.3s ease;
    }

    .card-description {
      font-size: 0.9375rem;
      line-height: 1.5;
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-md);
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .badges-wrapper {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
      margin-bottom: var(--spacing-md);
    }

    .badge {
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-high {
      background-color: var(--color-priority-high-bg);
      color: var(--color-priority-high-text);
    }

    .badge-status {
      background-color: var(--color-status-bg);
      color: var(--color-status-text);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .card.completed .badge-status {
      background-color: var(--color-status-done-bg);
      color: var(--color-status-done-text);
    }

    .meta-data {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
      font-size: 0.875rem;
    }

    .due-date {
      color: var(--color-text-secondary);
    }

    .time-remaining {
      color: var(--color-priority-high-text);
      font-weight: 500;
    }

    .card.completed .time-remaining {
      color: var(--color-text-secondary);
    }

    .tags-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }

    .tag-item {
      background-color: var(--color-tag-bg);
      color: var(--color-tag-text);
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    .actions-wrapper {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-sm);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--color-border);
    }

    .btn {
      background-color: transparent;
      border: 1px solid var(--color-btn-border);
      color: var(--color-btn-text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .btn:hover {
      background-color: var(--color-btn-hover-bg);
    }

    .btn:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    .btn-delete:hover {
      background-color: var(--color-btn-danger-hover);
      color: var(--color-btn-danger-text);
      border-color: var(--color-btn-danger-hover);
    }
  </style>
</head>
<body>

  <article class="card" role="region" aria-label="Todo task: Redesign the Onboarding Flow" data-testid="test-todo-card" id="todo-card">
    
    <div class="header-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="complete-toggle" class="checkbox-input" data-testid="test-todo-complete-toggle">
        <label for="complete-toggle" class="checkbox-label">Mark as done</label>
      </div>
      <h2 class="card-title" data-testid="test-todo-title">Redesign the Onboarding Flow</h2>
    </div>

    <p class="card-description" data-testid="test-todo-description">
      Update the onboarding screens to align with the new brand guidelines and improve drop-off rate.
    </p>

    <div class="badges-wrapper">
      <span class="badge badge-high" aria-label="Priority: High" data-testid="test-todo-priority">High</span>
      <span class="badge badge-status" aria-label="Status: In Progress" data-testid="test-todo-status" id="status-badge">In Progress</span>
    </div>

    <div class="meta-data">
      <time datetime="2026-04-18T18:00:00Z" class="due-date" data-testid="test-todo-due-date">Due Apr 18, 2026</time>
      <div aria-live="polite">
        <time datetime="2026-04-18T18:00:00Z" class="time-remaining" data-testid="test-todo-time-remaining" id="time-remaining"></time>
      </div>
    </div>

    <ul class="tags-list" role="list" data-testid="test-todo-tags">
      <li class="tag-item" data-testid="test-todo-tag-work">work</li>
      <li class="tag-item" data-testid="test-todo-tag-urgent">urgent</li>
      <li class="tag-item">design</li>
    </ul>

    <div class="actions-wrapper">
      <button class="btn" aria-label="Edit task" data-testid="test-todo-edit-button" id="btn-edit">Edit</button>
      <button class="btn btn-delete" aria-label="Delete task" data-testid="test-todo-delete-button" id="btn-delete">Delete</button>
    </div>

  </article>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // DOM Elements
      const card = document.getElementById('todo-card');
      const toggle = document.getElementById('complete-toggle');
      const statusBadge = document.getElementById('status-badge');
      const timeRemainingNode = document.getElementById('time-remaining');
      const editBtn = document.getElementById('btn-edit');
      const deleteBtn = document.getElementById('btn-delete');

      // Target Date: April 18, 2026 18:00 UTC
      const dueDate = new Date('2026-04-18T18:00:00Z');

      // Update Time Remaining Logic
      const renderTimeRemaining = () => {
        const now = Date.now();
        const diffMs = dueDate.getTime() - now;
        const diffSecs = Math.floor(diffMs / 1000);
        const diffMins = Math.floor(diffSecs / 60);
        const diffHours = Math.floor(diffMins / 60);
        const diffDays = Math.floor(diffHours / 24);

        if (diffMs > 0) {
          if (diffDays > 2) {
            timeRemainingNode.textContent = `Due in ${diffDays} days`;
          } else if (diffDays >= 1 || (diffHours >= 24 && diffHours <= 48)) {
             timeRemainingNode.textContent = "Due tomorrow";
          } else if (diffHours > 0) {
            timeRemainingNode.textContent = `Due in ${diffHours} hours`;
          } else if (diffMins > 5) {
            timeRemainingNode.textContent = `Due in ${diffMins} minutes`;
          } else {
            timeRemainingNode.textContent = "Due now!";
          }
        } else {
          const pastSecs = Math.abs(diffSecs);
          const pastMins = Math.floor(pastSecs / 60);
          const pastHours = Math.floor(pastMins / 60);
          const pastDays = Math.floor(pastHours / 24);

          if (pastDays > 0) {
            timeRemainingNode.textContent = `Overdue by ${pastDays} days`;
          } else {
            timeRemainingNode.textContent = `Overdue by ${pastHours} hours`;
          }
        }
      };

      // Initialize and set interval
      renderTimeRemaining();
      setInterval(renderTimeRemaining, 60000);

      // Checkbox Toggle Event
      toggle.addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        
        if (isChecked) {
          card.classList.add('completed');
          statusBadge.textContent = 'Done';
          statusBadge.setAttribute('aria-label', 'Status: Done');
        } else {
          card.classList.remove('completed');
          statusBadge.textContent = 'In Progress';
          statusBadge.setAttribute('aria-label', 'Status: In Progress');
        }
      });

      // Button Events
      editBtn.addEventListener('click', () => {
        console.log('Edit clicked');
      });

      deleteBtn.addEventListener('click', () => {
        alert('Task deleted!');
      });
    });
  </script>
</body>
</html>
